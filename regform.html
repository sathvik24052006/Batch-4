<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css
</head>
<body>
    <h1>Create a new account</h1><br>
    <h4>It's free and always will be.<br><br></h4>
    <form>
        <label for="firstname"></label>
        <input type="text" id="firstname" name="firstname" placeholder="First name" required> 
        <label for="lastname"></label>
        <input type="text" id="lastname" name="lastname" placeholder="Last name" required><br><br>
        <input placeholder="Mobile number or Email id"></input><br><br>
        <label for="password"></label>
        <input type="password" id="password" name="password" placeholder="New password" required><br><br>
        <label for="dob"></label>
        <input type="date" id="dob" name="dob" required><font color="blue">Why do i need to provide my DOB?</font><br><br>
        <label for="gender"></label>
        <input type="radio" id="male   " name="gender" value="male">
        <label for="    male">Male</label>
        <input type="radio" id="female  " name="gender" value="         female">               
        <label for="female">Female</label> <br><br>
        
        <button type="submit">Sign Up</button><br><br>


    </form>
        <p>Thank you for joining!</p>
</body>
</html>
